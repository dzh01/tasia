services:
  ollama:
    image: ollama/ollama:0.3.0
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - ai_internal
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.3.0
    ports:
      - "127.0.0.1:3000:8080"
    networks:
      - ai_internal
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
  qdrant:
    image: qdrant/qdrant:v1.10.0
    # no published ports
    networks:
      - ai_internal
networks:
  ai_internal:
    internal: true
