name: test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go mod download
      - run: go test ./... -count=1
      - run: go build ./cmd/tasia
      - run: ./tasia review --path examples/messy-ollama-stack --no-write
